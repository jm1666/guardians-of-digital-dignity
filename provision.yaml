---
- name: The Great One - Automated Fortress Build
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Facts - Generate unique secrets
      ansible.builtin.set_fact:
        gen_wifi_psk: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=16') }}"
        gen_pihole_pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=12') }}"
        gen_ssid: "Fortress-{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=16') | upper }}"
        new_fortress_name: "fortress-{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_lowercase,digits length=6') }}"

    - name: Facts - Create Recovery File
      ansible.builtin.template:
        src: files/FORTRESS_RECOVERY.txt
        dest: /home/fortress/FORTRESS_RECOVERY.txt
        owner: fortress
        group: fortress
        mode: '0600'      

    - name: Initiation - Unblock WiFi Radio
      ansible.builtin.shell:
        cmd: rfkill unblock wifi
      changed_when: false

    - name: Initiation - Persist RFKILL State (SystemD Override)
      ansible.builtin.shell:
        cmd: |
          for f in /var/lib/systemd/rfkill/*:wlan; do 
            if [ -f "$f" ]; then
              echo 0 > "$f"
            fi
          done
      register: rfkill_persist
      changed_when: "rfkill_persist.rc == 0"

    - name: Initiation - Ensure WiFi is enabled in NetworkManager
      ansible.builtin.shell:
        cmd: nmcli radio wifi on
      changed_when: false

    - name: Initiation - Set the system hostname
      ansible.builtin.hostname:
        name: "{{ new_fortress_name }}"
      register: hostname_changed

    - name: Initiation - Update /etc/hosts for the new hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ new_fortress_name }}"
        state: present

    - name: Initiation - Update with new identity
      ansible.builtin.debug:
        msg: "Fortress has been renamed to {{ new_fortress_name }}. Reboot required for full effect."
      when: hostname_changed.changed
      notify: Reboot Required

    - name: Initiation - Enable I2C and DS3231 RTC
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "{{ item }}"
        state: present
      loop:
        - "dtparam=i2c_arm=on"
        - "dtoverlay=i2c-rtc,ds3231"
      notify: Reboot Required
      when: "'Raspberry Pi 5' not in ansible_facts['model']"

    - name: Initiation - Configure PWM Fan (Argon40 Mini Fan)
      ansible.builtin.blockinfile:
        path: /boot/firmware/config.txt
        marker: "# {mark} ANSIBLE MANAGED Argon40 FAN"
        insertafter: EOF
        state: present
        block: |
          dtoverlay=pwm-gpio-fan,fan_gpio=18,fan_temp0=45000,fan_temp0_hyst=5000
      notify: Reboot Required
      when: "'Raspberry Pi 5' not in ansible_facts['model']"

    - name: Initiation - Configure PWM Fan Curve (RasPi 5)
      ansible.builtin.blockinfile:
        path: /boot/firmware/config.txt
        marker: "# {mark} ANSIBLE MANAGED PI5 FAN CURVE"
        insertafter: EOF
        state: present
        block: |
          [pi5]
          dtparam=fan_temp0=45000,fan_temp0_speed=75,fan_temp0_hyst=5000
          dtparam=fan_temp1=55000,fan_temp1_speed=125,fan_temp1_hyst=5000
          dtparam=fan_temp2=65000,fan_temp2_speed=175,fan_temp2_hyst=5000
          dtparam=fan_temp3=75000,fan_temp3_speed=255,fan_temp3_hyst=5000
          [all]
      notify: Reboot Required
      when: "'Raspberry Pi 5' in ansible_facts['model']"

    - name: Initiation - Install basic dependencies
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - firewalld
          - python3-debian
        state: present
        update_cache: yes

    - name: Initiation - Ensure FirewallD is started and enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    - name: Minimal GUI Stack - Install
      ansible.builtin.apt:
        name:
          - xrdp
          - xorgxrdp
          - openbox
          - tint2
          - xterm
          - rpi-chromium-mods
        state: present

    - name: Minimal GUI Stack - Configure XRDP to start Openbox
      ansible.builtin.copy:
        dest: /home/fortress/.xsession
        owner: fortress
        group: fortress
        mode: '0644'
        content: "exec openbox-session"

    - name: Minimal GUI Stack - Ensure XRDP service is running
      ansible.builtin.service:
        name: xrdp
        state: started
        enabled: yes
    
    - name: Minimal GUI Stack - Create Openbox config directory
      ansible.builtin.file:
        path: /home/fortress/.config/openbox
        state: directory
        owner: fortress
        group: fortress

    - name: Minimal GUI Stack - Configure Openbox Autostart (Launch tint2)
      ansible.builtin.template:
        src: files/openbox-autostart
        dest: /home/fortress/.config/openbox/autostart
        owner: fortress
        group: fortress
        mode: '0755'

    - name: NetworkManager - Deploy Config for Global Stealth Configuration
      ansible.builtin.template:
        src: files/99-fortress-stealth.conf
        dest: /etc/NetworkManager/conf.d/99-fortress-stealth.conf
        owner: root
        group: root
        mode: '0644'

    - name: NetworkManager - Deploy Config for wlan0
      ansible.builtin.template:
        src: files/Fortress-AP.nmconnection
        dest: /etc/NetworkManager/system-connections/Fortress-AP.nmconnection
        owner: root
        group: root
        mode: '0600'
      register: nm_config_file

    - name: NetworkManager - Deploy Config for eth0
      ansible.builtin.template:
        src: files/Fortress-AP.nmconnection
        dest: /etc/NetworkManager/system-connections/eth0.nmconnection
        owner: root
        group: root
        mode: '0600'
      register: nm_config_file

    - name: NetworkManager - Restart NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: restarted

    - name: NetworkManager - Force NetworkManager to learn new config
      ansible.builtin.shell: |
        cmd: |
          nmcli connection reload
          nmcli connection up eth0
          nmcli connection up Fortress-AP
      when: nm_config_file.changed
      
    - name: Initial Configuration for FirewallD - Configure TTL/HL Mangling
      ansible.builtin.shell:
        cmd: |
          firewall-cmd --permanent --direct --add-rule ipv4 mangle POSTROUTING 0 -j TTL --ttl-set 65
          firewall-cmd --permanent --direct --add-rule ipv6 mangle POSTROUTING 0 -j HL --hl-set 65
      notify: Reload FirewallD

    - name: Initial Configuration for FirewallD - Create Hotspot to Public Policy (Scout)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToPublic
          firewall-cmd --permanent --policy hotspotToPublic --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToPublic --add-egress-zone public
          firewall-cmd --permanent --policy hotspotToPublic --set-priority -1
          firewall-cmd --permanent --policy hotspotToPublic --set-target ACCEPT
          firewall-cmd --permanent --policy hotspotToPublic --add-masquerade
      notify: Reload FirewallD

    - name: Initial Configuration for FirewallD - Create Hotspot to VPN Policy (Tailscale)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToVPN
          firewall-cmd --permanent --policy hotspotToVPN --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToVPN --add-egress-zone work
          firewall-cmd --permanent --policy hotspotToVPN --set-priority -10
          firewall-cmd --permanent --policy hotspotToVPN --set-target REJECT
          firewall-cmd --permanent --policy hotspotToVPN --add-masquerade
      notify: Reload FirewallD

    - name: Initial Configuration for FirewallD - Zone Assignment
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - { iface: 'eth0', zone: 'trusted' }
        - { iface: 'wlan1', zone: 'public' }
        - { iface: 'wlan0', zone: 'nm-shared' }
      notify: Reload FirewallD

    - name: Initial Configuration for FirewallD - Close Public Zone Services
      ansible.posix.firewalld:
        zone: public
        service: "{{ item }}"
        permanent: true
        state: disabled
      loop: [ssh, dhcpv6-client]
      notify: Reload FirewallD

    - name: Initial Configuration for FirewallD - Set Public Zone to DROP
      ansible.builtin.shell: |
        firewall-cmd --permanent --zone=public --set-target=DROP
      notify: Reload FirewallD
      
    - name: Initial Configuration for FirewallD - Open Ports for Pi-hole
      ansible.posix.firewalld:
        zone: nm-shared
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - dns
        - dhcp
        - http
    
    - name: Dnscrypt-Proxy - Configure Socket - Create drop-in directory
      ansible.builtin.file:
        path: "/etc/systemd/system/dnscrypt-proxy.socket.d"
        state: directory
        mode: '0755'

    - name: Dnscrypt-Proxy - Configure Socket
      ansible.builtin.template:
        src: files/dnscrypt-proxy.socket-override.conf
        dest: /etc/systemd/system/dnscrypt-proxy.socket.d/override.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: Dnscrypt-Proxy - Ensure config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/dnscrypt-proxy
        owner: root
        group: root
        mode: "0755"

    - name: Dnscrypt-Proxy - Deploy config
      ansible.builtin.template:
        src: files/dnscrypt-proxy.toml
        dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
        owner: root
        group: root
        mode: '0644'

    - name: Dnscrypt-Proxy - Install
      ansible.builtin.apt:
        name: dnscrypt-proxy
        state: present
        dpkg_options: 'force-confold,force-confdef'

    - name: Dnscrypt-Proxy - Disable resolvconf takeover
      ansible.builtin.service:
        name: dnscrypt-proxy-resolvconf
        state: stopped
        enabled: false

    - name: systemd-resolved - Install
      ansible.builtin.apt:
        name: systemd-resolved
        state: present

    - name: systemd-resolved - Ensure config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/systemd/resolved.conf.d
        owner: root
        group: root
        mode: "0755"

    - name: systemd-resolved - Neutralise stub listener
      ansible.builtin.template:
        src: files/fortress-no-stub.conf
        dest: /etc/systemd/resolved.conf.d/fortress-no-stub.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: systemd-resolved - Restart
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted

    - name: pihole - Create group
      ansible.builtin.group:
        name: pihole
        state: present
    
    - name: pihole - Create user
      ansible.builtin.user:
        name: pihole
        home: "/opt/pihole"
        shell: "/usr/sbin/nologin"
        comment: "PiHole"
        group: pihole
        password: "*"
        state: present
        remove: true
        force: true

    - name: pihole - Ensure config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/pihole
        owner: pihole
        group: pihole
        mode: "0775"

    - name: pihole - Deploy config
      ansible.builtin.template:
        src: files/pihole.toml
        dest: /etc/pihole/pihole.toml
        owner: pihole
        group: pihole
        mode: '0644'
  
    - name: pihole - Run installer
      ansible.builtin.shell:
        cmd: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
        creates: /etc/systemd/system/pihole-FTL.service
      register: pihole_install_result

    - name: pihole - Set Admin Password
      ansible.builtin.shell:
        cmd: "pihole setpassword {{ gen_pihole_pw }}"

    - name: pihole - Install SQLite3
      ansible.builtin.apt:
        name: sqlite3
        state: present

    - name: pihole - Add blocklists
      ansible.builtin.shell:
        cmd: |
          sqlite3 /etc/pihole/gravity.db "INSERT OR IGNORE INTO adlist (address, enabled, comment) VALUES ('{{ item.url }}', 1, '{{ item.comment }}');"
      loop:
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-clients', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-trackers', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-websites', comment: '' } 
        - { url: 'https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/hosts.txt', comment: '' } 
        - { url: 'https://big.oisd.nl', comment: '' } 
        - { url: 'https://paulgb.github.io/BarbBlock/blacklists/hosts-file.txt', comment: '' }
      loop_control:
        pause: 5
      register: adlist_added

    - name: pihole -  Update Gravity (Rebuild blocklist database)
      ansible.builtin.command: pihole -g
      when: adlist_added.changed

    - name: pihole - Intercept Port 53 (DNS Redirect)
      ansible.posix.firewalld:
        zone: "{{ item.0 }}"
        permanent: true
        immediate: true
        state: enabled
        # Force a list of one dictionary per iteration
        port_forward:
          - port: 53
            proto: "{{ item.1 }}"
            toport: 53
            toaddr: 10.42.0.1
      with_nested:
        - ['nm-shared']
        - ['udp', 'tcp']

    - name: pihole - Check if resolv.conf is already locked
      ansible.builtin.shell:
        cmd: |
          lsattr /etc/resolv.conf
      register: resolv_attr
      changed_when: false
      failed_when: false

    - name: pihole - Reclaim and Lock DNS
      when: "'i' not in resolv_attr.stdout"
      ansible.builtin.shell:
        cmd: |
          rm -f /etc/resolv.conf
          echo "nameserver 127.0.0.1" > /etc/resolv.conf
          echo "options edns0 trust-ad" >> /etc/resolv.conf
          chattr +i /etc/resolv.conf

    - name: Tailscale - Create keyring directory
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Tailscale - Add GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: '0644'

    - name: Tailscale - Add Repository
      ansible.builtin.deb822_repository:
        name: tailscale
        types: deb
        uris: https://pkgs.tailscale.com/stable/debian
        suites: "{{ ansible_distribution_release }}"
        components: main
        signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
        state: present

    - name: Tailscale - Install
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Tailscale - Ensure service is enabled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
    
    - name: Tailscale - Configure FirewallD for Tailscale
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
      loop:
        - { iface: 'tailscale0', zone: 'work' }

    - name: Hardening - Kernel 
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-fortress.conf
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.ipv6.conf.all.forwarding', value: '1' }
        - { name: 'net.ipv4.icmp_echo_ignore_all', value: '1' }
        - { name: 'net.ipv6.icmp.echo_ignore_all', value: '1' }
        - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
        
    - name: Misc - Deploy System Report on Login
      ansible.builtin.template:
        src: files/z99-fortress-sitrep.sh
        dest: /etc/profile.d/z99-fortress-sitrep.sh
        owner: root
        group: root
        mode: '0644'

    - name: Misc - Deploy fortress-mode toggle script
      ansible.builtin.template:
        src: files/fortress-toggle.sh
        dest: /usr/local/bin/fortress-toggle
        owner: root
        group: root
        mode: '0755'

    - name: Misc - Configure journald to use RAM only
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=volatile'
      notify: Restart journald
      when: "'Raspberry Pi 5' not in ansible_facts['model']"
    
    - name: Misc - Ensure /var/log/journal is removed (Force Volatile)
      ansible.builtin.file:
        path: /var/log/journal
        state: absent
      notify: Restart journald
      when: "'Raspberry Pi 5' not in ansible_facts['model']"

  handlers:
    - name: Reload SystemD
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Reload FirewallD
      ansible.builtin.command: firewall-cmd --reload

    - name: Restart Pi-hole
      ansible.builtin.service:
        name: pihole-FTL
        state: restarted

    - name: Reboot Required
      ansible.builtin.set_fact:
        needs_reboot: true
        
    - name: Restart journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted
