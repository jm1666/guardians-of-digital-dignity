---
- name: The Great One - Automated Fortress Build
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Generate unique secrets
      ansible.builtin.set_fact:
        gen_wifi_psk: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=16') }}"
        gen_pihole_pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=12') }}"
        gen_ssid: "Fortress-{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=16') | upper }}"
        new_fortress_name: "fortress-{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_lowercase,digits length=6') }}"

    - name: Unblock WiFi Radio
      ansible.builtin.shell:
        cmd: rfkill unblock wifi
      changed_when: false

    - name: Persist RFKILL State (SystemD Override)
      ansible.builtin.shell:
        cmd: |
          for f in /var/lib/systemd/rfkill/*:wlan; do 
            if [ -f "$f" ]; then
              echo 0 > "$f"
            fi
          done
      register: rfkill_persist
      changed_when: "rfkill_persist.rc == 0"

    - name: Ensure WiFi is enabled in NetworkManager
      ansible.builtin.shell:
        cmd: nmcli radio wifi on
      changed_when: false

    - name: Set the system hostname
      ansible.builtin.hostname:
        name: "{{ new_fortress_name }}"
      register: hostname_changed

    - name: Update /etc/hosts for the new hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ new_fortress_name }}"
        state: present

    - name: Update SITREP with new identity
      ansible.builtin.debug:
        msg: "Fortress has been renamed to {{ new_fortress_name }}. Reboot required for full effect."
      when: hostname_changed.changed
      notify: Reboot Required

    - name: Enable I2C and DS3231 RTC
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "{{ item }}"
        state: present
      loop:
        - "dtparam=i2c_arm=on"
        - "dtoverlay=i2c-rtc,ds3231"

    - name: Configure PWM Fan
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "dtoverlay=pwm-gpio-fan,fan_gpio=18,fan_temp0=45000,fan_temp0_hyst=5000"
        state: present
      notify: Reboot Required

    - name: Install basic dependencies
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - firewalld
          - python3-debian
        state: present
        update_cache: yes

    - name: Ensure FirewallD is started and enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    - name: Install Minimal GUI Stack
      ansible.builtin.apt:
        name:
          - xrdp
          - xorgxrdp
          - openbox
          - tint2
          - xterm
          - rpi-chromium-mods
        state: present

    - name: Configure XRDP to start Openbox
      ansible.builtin.copy:
        dest: /home/fortress/.xsession
        owner: fortress
        group: fortress
        mode: '0644'
        content: "exec openbox-session"

    - name: Ensure XRDP service is running
      ansible.builtin.service:
        name: xrdp
        state: started
        enabled: yes
    
    - name: Create Openbox config directory
      ansible.builtin.file:
        path: /home/fortress/.config/openbox
        state: directory
        owner: fortress
        group: fortress

    - name: Configure Openbox Autostart (Launch tint2)
      ansible.builtin.template:
        src: files/openbox-autostart
        dest: /home/fortress/.config/openbox/autostart
        owner: fortress
        group: fortress
        mode: '0755'

    # 2. SAVE SECRETS TO RECOVERY FILE
    - name: Create Recovery File
      ansible.builtin.template:
        src: files/FORTRESS_RECOVERY.txt
        dest: /home/fortress/FORTRESS_RECOVERY.txt
        owner: fortress
        group: fortress
        mode: '0600'      

    - name: Initial Configuration for FirewallD
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - { iface: 'wlan1', zone: 'public' }
        - { iface: 'eth0', zone: 'trusted' }

    - name: Initial Configuration for FirewallD - Set Public Zone to DROP
      ansible.builtin.shell: |
        firewall-cmd --permanent --zone=public --set-target=DROP
      notify: Reload FirewallD

    - name: Close Public Zone Services
      ansible.posix.firewalld:
        zone: public
        service: "{{ item }}"
        permanent: true
        state: disabled
      loop: [ssh, dhcpv6-client]
      notify: Reload FirewallD

    - name: Configure TTL/HL Mangling
      ansible.builtin.shell:
        cmd: |
          firewall-cmd --permanent --direct --add-rule ipv4 mangle POSTROUTING 0 -j TTL --ttl-set 65
          firewall-cmd --permanent --direct --add-rule ipv6 mangle POSTROUTING 0 -j HL --hl-set 65
      notify: Reload FirewallD

    - name: Create Hotspot to Public Policy (Scout)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToPublic
          firewall-cmd --permanent --policy hotspotToPublic --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToPublic --add-egress-zone public
          firewall-cmd --permanent --policy hotspotToPublic --set-priority -1
          firewall-cmd --permanent --policy hotspotToPublic --set-target ACCEPT
          firewall-cmd --permanent --policy hotspotToPublic --add-masquerade
      notify: Reload FirewallD

    - name: Create Hotspot to VPN Policy (Tailscale)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToVPN
          firewall-cmd --permanent --policy hotspotToVPN --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToVPN --add-egress-zone work
          firewall-cmd --permanent --policy hotspotToVPN --set-priority -10
          firewall-cmd --permanent --policy hotspotToVPN --set-target REJECT
          firewall-cmd --permanent --policy hotspotToVPN --add-masquerade
      notify: Reload FirewallD
    
    - name: Deploy NetworkManager Connection for Global Stealth Configuration
      ansible.builtin.template:
        src: files/99-fortress-stealth.conf
        dest: /etc/NetworkManager/conf.d/99-fortress-stealth.conf
        owner: root
        group: root
        mode: '0644'

    - name: Deploy NetworkManager Connection for wlan0 (Management)
      ansible.builtin.template:
        src: files/Fortress-AP.nmconnection
        dest: /etc/NetworkManager/system-connections/Fortress-AP.nmconnection
        owner: root
        group: root
        mode: '0600'
      register: nm_config_file

    - name: Restart NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: restarted

    - name: Force NetworkManager to learn new config
      ansible.builtin.shell: |
        cmd: |
          nmcli connection reload
          nmcli connection up Fortress-AP
      when: nm_config_file.changed
    
    - name: Configure Dnscrypt-Proxy Socket - Create drop-in directory
      ansible.builtin.file:
        path: "/etc/systemd/system/dnscrypt-proxy.socket.d"
        state: directory
        mode: '0755'

    - name: Configure Dnscrypt-Proxy Socket
      ansible.builtin.template:
        src: files/dnscrypt-proxy.socket-override.conf
        dest: /etc/systemd/system/dnscrypt-proxy.socket.d/override.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: Ensure Dnscrypt-Proxy config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/dnscrypt-proxy
        owner: root
        group: root
        mode: "0755"

    - name: Configure Dnscrypt-Proxy
      ansible.builtin.template:
        src: files/dnscrypt-proxy.toml
        dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
        owner: root
        group: root
        mode: '0644'

    - name: Install Dnscrypt-Proxy
      ansible.builtin.apt:
        name: dnscrypt-proxy
        state: present
        dpkg_options: 'force-confold,force-confdef'

    - name: Disable Dnscrypt-Proxy resolvconf takeover
      ansible.builtin.service:
        name: dnscrypt-proxy-resolvconf
        state: stopped
        enabled: false
      become: true

    - name: Install systemd-resolved via Ansible
      ansible.builtin.apt:
        name: systemd-resolved
        state: present

    - name: Ensure systemd-resolved config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/systemd/resolved.conf.d
        owner: root
        group: root
        mode: "0755"

    - name: Neutralise systemd-resolved stub listener
      ansible.builtin.template:
        src: files/fortress-no-stub.conf
        dest: /etc/systemd/resolved.conf.d/fortress-no-stub.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: Restart systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted

    - name: Configure FirewallD (wlan0 for user side)
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - { iface: 'wlan0', zone: 'nm-shared' }

    - name: Open Ports for Pi-hole
      ansible.posix.firewalld:
        zone: nm-shared
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - dns
        - dhcp
        - http

    - name: Create pihole group
      ansible.builtin.group:
        name: pihole
        state: present
    
    - name: Create pihole user
      ansible.builtin.user:
        name: pihole
        home: "/opt/pihole"
        shell: "/usr/sbin/nologin"
        comment: "PiHole"
        group: pihole
        password: "*"
        state: present
        remove: true
        force: true

    - name: Ensure Pi-hole config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/pihole
        owner: pihole
        group: pihole
        mode: "0775"

    - name: Deploy Pi-hole Config
      ansible.builtin.template:
        src: files/pihole.toml
        dest: /etc/pihole/pihole.toml
        owner: pihole
        group: pihole
        mode: '0644'
  
    - name: Run Pi-hole unattended installer
      ansible.builtin.shell:
        cmd: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
        creates: /etc/systemd/system/pihole-FTL.service
      register: pihole_install_result

    - name: Set Pi-hole Admin Password
      ansible.builtin.shell:
        cmd: "pihole setpassword {{ gen_pihole_pw }}"

    - name: Install SQLite3
      ansible.builtin.apt:
        name: sqlite3
        state: present

    - name: Add blocklists to Pi-hole
      ansible.builtin.shell:
        cmd: |
          sqlite3 /etc/pihole/gravity.db "INSERT OR IGNORE INTO adlist (address, enabled, comment) VALUES ('{{ item.url }}', 1, '{{ item.comment }}');"
      loop:
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-clients', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-trackers', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-websites', comment: '' } 
        - { url: 'https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/hosts.txt', comment: '' } 
        - { url: 'https://big.oisd.nl', comment: '' } 
        - { url: 'https://paulgb.github.io/BarbBlock/blacklists/hosts-file.txt', comment: '' }
      loop_control:
        pause: 5
      register: adlist_added

    - name: Update Gravity (Rebuild blocklist database)
      ansible.builtin.command: pihole -g
      when: adlist_added.changed

    - name: Intercept Port 53 (DNS Redirect)
      become: true
      ansible.posix.firewalld:
        zone: "{{ item.0 }}"
        permanent: true
        immediate: true
        state: enabled
        # Force a list of one dictionary per iteration
        port_forward:
          - port: 53
            proto: "{{ item.1 }}"
            toport: 53
            toaddr: 10.42.0.1
      with_nested:
        - ['nm-shared']
        - ['udp', 'tcp']

    - name: Check if resolv.conf is already locked
      ansible.builtin.shell:
        cmd: |
          lsattr /etc/resolv.conf
      register: resolv_attr
      changed_when: false
      failed_when: false

    - name: Reclaim and Lock DNS
      when: "'i' not in resolv_attr.stdout"
      become: true
      ansible.builtin.shell:
        cmd: |
          rm -f /etc/resolv.conf
          echo "nameserver 127.0.0.1" > /etc/resolv.conf
          echo "options edns0 trust-ad" >> /etc/resolv.conf
          chattr +i /etc/resolv.conf

    - name: Create keyring directory
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Add Tailscale GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: '0644'

    - name: Add Tailscale repository
      ansible.builtin.deb822_repository:
        name: tailscale
        types: deb
        uris: https://pkgs.tailscale.com/stable/debian
        suites: "{{ ansible_distribution_release }}"
        components: main
        signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
        state: present

    - name: Install Tailscale package
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Ensure tailscaled service is enabled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
    
    - name: Configure FirewallD for Tailscale
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
      loop:
        - { iface: 'tailscale0', zone: 'work' }

    - name: Apply Fortress Kernel Hardening
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-fortress.conf
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.ipv6.conf.all.forwarding', value: '1' }
        - { name: 'net.ipv4.icmp_echo_ignore_all', value: '1' }
        - { name: 'net.ipv6.icmp.echo_ignore_all', value: '1' }
        - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
        
    - name: Deploy System Report on Login
      ansible.builtin.template:
        src: files/z99-fortress-sitrep.sh
        dest: /etc/profile.d/z99-fortress-sitrep.sh
        owner: root
        group: root
        mode: '0644'

    - name: Deploy fortress-mode toggle script
      ansible.builtin.template:
        src: files/fortress-toggle.sh
        dest: /usr/local/bin/fortress-toggle
        owner: root
        group: root
        mode: '0755'

    - name: Configure journald to use RAM only
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage=volatile'
      notify: Restart journald
    
    - name: Ensure /var/log/journal is removed (Force Volatile)
      ansible.builtin.file:
        path: /var/log/journal
        state: absent
      notify: Restart journald

  handlers:
    - name: Reload SystemD
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Reload FirewallD
      ansible.builtin.command: firewall-cmd --reload

    - name: Restart Pi-hole
      ansible.builtin.service:
        name: pihole-FTL
        state: restarted

    - name: Reboot Required
      ansible.builtin.set_fact:
        needs_reboot: true
        
    - name: Restart journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted
