---
- name: The Great One - Automated Fortress Build
  hosts: localhost
  connection: local
  become: true

  tasks:
    # 1. SECRET GENERATION
    - name: Generate unique secrets
      ansible.builtin.set_fact:
        gen_wifi_psk: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
        gen_pihole_pw: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=12') }}"
        gen_ssid: "Fortress-{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') | upper }}"

    - name: Install Firewalld safely via Ansible
      ansible.builtin.apt:
        name: firewalld
        state: present
        update_cache: yes

    - name: Ensure Firewalld is started and enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: yes

    # --- GUI: OPENBOX + TINT2 + XRDP ---
    - name: Install Minimal GUI Stack
      ansible.builtin.apt:
        name: [xrdp, xorgxrdp, openbox, tint2, xterm]
        state: present

    - name: Configure XRDP to start Openbox
      ansible.builtin.copy:
        dest: /home/fortress/.xsession
        owner: fortress
        group: fortress
        mode: '0644'
        content: "exec openbox-session"

    - name: Ensure XRDP service is running
      ansible.builtin.service:
        name: xrdp
        state: started
        enabled: yes

   - name: Create Openbox config directory
      ansible.builtin.file:
        path: /home/fortress_admin/.config/openbox
        state: directory
        owner: fortress_admin
        group: fortress_admin

    - name: Configure Openbox Autostart (Launch tint2)
      ansible.builtin.copy:
        dest: /home/fortress_admin/.config/openbox/autostart
        owner: fortress_admin
        group: fortress_admin
        mode: '0755'
        content: |
          # Start the tint2 panel in the background
          tint2 &
          # Optional: disable screen blanking for your monitoring dashboard
          xset s off && xset -dpms &

    # 2. SAVE SECRETS TO RECOVERY FILE
    - name: Create Recovery File for Admin
      ansible.builtin.copy:
        dest: /home/fortress/FORTRESS_RECOVERY.txt
        owner: fortress
        group: fortress
        mode: '0600'
        content: |
          --- FORTRESS RECOVERY KEYSET ---
          TIMESTAMP: {{ ansible_date_time.iso8601 }}
          SSID:      {{ gen_ssid }}
          WIFI PSK:  {{ gen_wifi_psk }}
          PI-HOLE:   {{ gen_pihole_pw }}
          --------------------------------
          SECURE THESE AND DELETE THIS FILE BEFORE RUNNING 'SEAL'.

    # 3. NETWORK: Zones & NAT
    - name: Configure Firewalld (eth0=Trusted, wifi1=Public DROP)
      ansible.posix.firewalld:
        interface: "{{ item.iface }}"
        zone: "{{ item.zone }}"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - { iface: 'wlan0', zone: 'nm-shared' }
        - { iface: 'wlan1', zone: 'public' }
        - { iface: 'eth0', zone: 'trusted' }

    - name: Set Public Zone to DROP
      ansible.builtin.shell: |
        firewall-cmd --permanent --zone=public --set-target=DROP
      notify: Reload Firewalld

    - name: Close Public Zone Services
      ansible.posix.firewalld:
        zone: public
        service: "{{ item }}"
        permanent: true
        state: disabled
      loop: [ssh, dhcpv6-client]
      notify: Reload Firewalld

    # --- TTL MANGLING (ISP STEALTH) ---
    - name: Configure TTL/HL Mangling
      ansible.builtin.shell:
        cmd: |
          firewall-cmd --permanent --direct --add-rule ipv4 mangle POSTROUTING 0 -j TTL --ttl-set 65
          firewall-cmd --permanent --direct --add-rule ipv6 mangle POSTROUTING 0 -j HL --hl-set 65
      notify: Reload Firewalld

    # --- FIREWALLD POLICIES (THE KILL-SWITCH) ---
    - name: Create Hotspot to Public Policy (Scout)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToPublic
          firewall-cmd --permanent --policy hotspotToPublic --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToPublic --add-egress-zone public
          firewall-cmd --permanent --policy hotspotToPublic --set-priority -1
          firewall-cmd --permanent --policy hotspotToPublic --set-target ACCEPT
          firewall-cmd --permanent --policy hotspotToPublic --add-masquerade
      notify: Reload Firewalld

    - name: Create Hotspot to VPN Policy (Tailscale)
      ansible.builtin.shell: |
        cmd: |
          firewall-cmd --permanent --new-policy hotspotToVPN
          firewall-cmd --permanent --policy hotspotToVPN --add-ingress-zone nm-shared
          firewall-cmd --permanent --policy hotspotToVPN --add-egress-zone work
          firewall-cmd --permanent --policy hotspotToVPN --set-priority -10
          firewall-cmd --permanent --policy hotspotToVPN --set-target REJECT
          firewall-cmd --permanent --policy hotspotToVPN --add-masquerade
      notify: Reload Firewalld

    # 4. AP & PRIVACY (DHCP Handover to Pi-hole)
    - name: Deploy NM Connection for wlan0 (Management)
      ansible.builtin.copy:
        dest: /etc/NetworkManager/system-connections/Fortress-AP.nmconnection
        owner: root
        group: root
        mode: '0600'
        content: |
          [connection]
          id=Fortress-AP
          type=wifi
          interface-name=wlan0
          autoconnect=true

          [wifi]
          ssid={{ gen_ssid }}
          mode=ap
          band=bg
          channel=0
          cloned-mac-address=permanent
          mac-address-randomization=never
          powersave=0

          [wifi-security]
          key-mgmt=wpa-psk
          proto=rsn
          pairwise=ccmp
          group=ccmp
          pmf=1
          psk={{ gen_wifi_psk }}

          [ipv4]
          method=manual
          address1=10.42.0.1/24

          [ipv6]
          method=ignore
      register: nm_config_file

    - name: Force NM to learn new config
      ansible.builtin.shell: |
        cmd: |
          nmcli connection reload
          nmcli connection up Fortress-AP
      when: nm_config_file.changed

    - name: Install Networking Stack
      ansible.builtin.apt:
        name: dnscrypt-proxy
        state: present
        update_cache: yes
    
    - name: Configure Dnscrypt-Proxy Socket - Create drop-in directory
      ansible.builtin.file:
        path: "/etc/systemd/system/dnscrypt-proxy.socket.d"
        state: directory
        mode: '0755'

    - name: Configure Dnscrypt-Proxy Socket (127.0.0.1:8053)
      ansible.builtin.copy:
        dest: /etc/systemd/system/dnscrypt-proxy.socket.d/override.conf
        content: |
          [Socket]
          ListenStream=
          ListenDatagram=
          ListenStream=127.0.0.1:8053
          ListenDatagram=127.0.0.1:8053
      notify: 
        - Reload Systemd
        - Restart Dnscrypt Socket
        - Restart Dnscrypt Service
    
    - name: Deploy Global Stealth NM Configuration
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/99-fortress-stealth.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          [device-mac-randomization]
          wifi.scan.rand-mac-address=yes
      
          [connection-mac-randomization]
          ethernet.cloned-mac-address=random
          wifi.cloned-mac-address=random
          ipv4.dhcp-client-id=mac
          ipv6.dhcp-duid-type=ll
      
          [main]
          hostname-mode=none
      notify: Restart NetworkManager

    - name: Install systemd-resolved via Ansible
      ansible.builtin.apt:
        name: systemd-resolved
        state: present
        update_cache: yes

    - name: Ensure systemd-resolved config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/systemd/resolved.conf.d
        owner: root
        group: root
        mode: "0775"

    - name: Neutralize systemd-resolved stub listener
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/fortress-no-stub.conf
        owner: root
        group: root
        mode: '0644'
        # Create directory if it doesn't exist
        content: |
          [Resolve]
          DNSStubListener=no
      notify: Restart Resolved

    - name: Open Ports for Pi-hole v6 (DNS/DHCP/Web)
      ansible.posix.firewalld:
        zone: nm-shared
        service: "{{ item }}"
        permanent: true
        state: enabled
      loop: [dns, dhcp, http]

    - name: Create pihole group
      ansible.builtin.group:
        name: pihole
        state: present
    
    - name: Create pihole user
      ansible.builtin.user:
        name: pihole
        home: "/home/pihole"
        shell: "/usr/sbin/nologin"
        comment: "PiHole"
        group: pihole
        password: "*"
        state: present
        remove: true
        force: true

    - name: Ensure Pi-hole config directory exists
      ansible.builtin.file:
        state: directory
        path: /etc/pihole
        owner: pihole
        group: pihole
        mode: "0775"

    - name: Deploy Pi-hole v6.0 Unified Config (TOML)
      ansible.builtin.template:
        src: files/pihole.toml
        dest: /etc/pihole/pihole.toml
        owner: pihole
        group: pihole
        mode: '0644'
  
    - name: Run Pi-hole v6 unattended installer
      ansible.builtin.shell:
        cmd: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
        creates: /etc/systemd/system/pihole-FTL.service
      register: pihole_install_result

    - name: Set Pi-hole Admin Password
      ansible.builtin.shell:
        cmd: "pihole setpassword {{ gen_pihole_pw }}"

    - name: Programmatically add blocklists to Pi-hole v6
      ansible.builtin.shell:
        cmd: |
          sqlite3 /etc/pihole/gravity.db "INSERT OR IGNORE INTO adlist (address, enabled, comment) VALUES ('{{ item.url }}', 1, '{{ item.comment }}');"
      loop:
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-clients', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-trackers', comment: '' }
        - { url: 'https://raw.githubusercontent.com/nextdns/piracy-blocklists/master/torrent-websites', comment: '' } 
        - { url: 'https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/hosts.txt', comment: '' } 
        - { url: 'https://big.oisd.nl', comment: '' } 
        - { url: 'https://paulgb.github.io/BarbBlock/blacklists/hosts-file.txt', comment: '' }
      register: adlist_added

    - name: Update Gravity (Rebuild blocklist database)
      ansible.builtin.command: pihole -g
      when: adlist_added.changed

    - name: Hijack Port 53 (DNS Redirect)
      ansible.posix.firewalld:
        zone: "{{ item }}"
        rich_rule: |
          rule family="ipv4" forward-port port="53" protocol="udp" to-port="53"
          rule family="ipv4" forward-port port="53" protocol="tcp" to-port="53"
        permanent: true
        state: enabled
      loop: ['nm-shared']

    - name: Install Tailscale via script
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com | sh
        # This 'executable' argument is the key fix
        executable: /bin/bash
        creates: /usr/bin/tailscale

    - name: Apply Fortress Kernel Hardening
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-fortress.conf
        reload: yes
      loop:
        # 1. THE ENGINE: Enable Routing for NAT/Masquerading
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.ipv6.conf.all.forwarding', value: '1' }

        # 2. STEALTH: Ignore all ICMP (No Ping / Black Hole)
        - { name: 'net.ipv4.icmp_echo_ignore_all', value: '1' }
        - { name: 'net.ipv6.icmp.echo_ignore_all', value: '1' }

        # 3. SECURITY: Disable Redirects (Prevent Man-in-the-Middle)
        - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }

        # 4. SPOOFING: Enable Source Validation (Reverse Path Filtering)
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
        
    # --- TACTICAL LOGON: WARNING + SITREP ---
    - name: Deploy Unified Fortress Login
      ansible.builtin.copy:
        dest: /etc/profile.d/z99-fortress-sitrep.sh
        owner: root
        group: root
        mode: '0644'
        content: |
          #!/bin/bash
          # Only run for interactive shells
          [[ $- != *i* ]] && return

          # 1. THE RECOVERY WARNING
          if [ -f /home/fortress/FORTRESS_RECOVERY.txt ]; then
              echo -e "\n\e[1;31m[!] SECURITY ALERT: RECOVERY SECRETS DETECTED ON DISK\e[0m"
              echo -e "\e[33mSecure credentials and 'shred -u ~/FORTRESS_RECOVERY.txt' immediately.\e[0m"
          fi

          # 2. THE SITREP (TACTICAL VIEW)
          echo -e "\n\e[1;34m--- [ FORTRESS SITREP ] ---\e[0m"
          echo -e "UPTIME:    $(uptime -p)"
          echo -e "TEMP:      $(vcgencmd measure_temp | cut -d= -f2)"
          
          echo -e "\n\e[1;32m[ NETWORKING ]\e[0m"
          echo -e "wlan0 (LOCAL): $(nmcli -t -f IP4.ADDRESS dev show wlan0 2>/dev/null | cut -d: -f2 || echo 'DOWN') [$(cat /sys/class/net/wlan0/address 2>/dev/null)]"
          echo -e "wlan1 (SCOUT): $(nmcli -t -f IP4.ADDRESS dev show wlan1 2>/dev/null | cut -d: -f2 || echo 'DOWN') [$(cat /sys/class/net/wlan1/address 2>/dev/null)]"
          echo -e "eth0 (SCOUT):  $(nmcli -t -f IP4.ADDRESS dev show eth0 2>/dev/null | cut -d: -f2 || echo 'DOWN') [$(cat /sys/class/net/wlan1/address 2>/dev/null)]"
          
          echo -e "\n\e[1;32m[ PRIVACY ]\e[0m"
          echo -e "PI-HOLE v6:    $(systemctl is-active pihole-FTL)"
          echo -e "DNSCRYPT:      $(systemctl is-active dnscrypt-proxy)"
          echo -e "TAILSCALE:     $(tailscale status --peers=false 2>/dev/null | head -n1 || echo 'OFFLINE')"
          
          echo -e "\n\e[1;32m[ SECURITY ]\e[0m"
          echo -e "ETH0 ZONE:     $(firewall-cmd --get-active-zones | grep -B1 eth0 | head -n1 || echo 'UNASSIGNED')"
          echo -e "PUBLIC ZONE:   $(firewall-cmd --zone=public --get-target)"
          echo -e "\e[1;34m---------------------------\e[0m\n"


  handlers:
    - name: Reload Systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Reload Firewalld
      ansible.builtin.shell: |
        firewall-cmd --runtime-to-permanent
        firewall-cmd --reload

    - name: Restart NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: restarted

    - name: Restart Dnscrypt Socket
      ansible.builtin.systemd:
        name: dnscrypt-proxy.socket
        state: restarted
        daemon_reload: yes

    - name: Restart Dnscrypt Service
      ansible.builtin.service:
        name: dnscrypt-proxy
        state: restarted
      listen: "Restart Dnscrypt"

    - name: Restart Pi-hole
      ansible.builtin.service:
        name: pihole-FTL
        state: restarted
      # Pi-hole runs last so it can verify its upstreams (dnscrypt) are live.
