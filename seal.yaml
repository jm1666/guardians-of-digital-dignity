---
- name: Seal the Mobile Fortress
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Ensure Tailscale is active before locking eth0
      ansible.builtin.command: tailscale status --peers=false
      register: ts_status
      changed_when: false
      failed_when: ts_status.rc != 0
      # If this fails, the playbook stops here to prevent a lockout.
      
    - name: Remove the temporary bootstrapper and service file
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/usr/local/bin/fortress-init.sh"
        - "/etc/profile.d/fortress-nag.sh"
        - "/var/lib/system-provisioned.flag"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Generate unique high-entropy sudo password
      ansible.builtin.set_fact:
        new_sudo_pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits,@#%^-_=+ length=20') }}"
      no_log: true

    - name: Apply new password to fortress user
      ansible.builtin.user:
        name: fortress
        password: "{{ new_sudo_pw | password_hash('sha512') }}"
        update_password: always
      no_log: true

    - name: Apply new password to current Ansible playbook
      ansible.builtin.set_fact:
        ansible_become_pass: "{{ new_sudo_pw }}"
      no_log: true

    - name: User Acknowledgement - SAVE THIS PASSWORD
      ansible.builtin.pause:
        prompt: |
          
          ============================================================
          NEW SUDO PASSWORD GENERATED:
          {{ new_sudo_pw }}
          ============================================================
          
          Save this password in your manager (KeepassXC, Bitwarden, etc.)
          Press ENTER once you have backed it up to continue.

    - name: Remove NOPASSWD entry from cloud-init files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/sudoers.d/90-cloud-init-users
        - /etc/sudoers.d/010_pi-nopasswd

    - name: Enable Standard Sudo (Password Required)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/fortress-hardened
        mode: '0440'
        content: "fortress ALL=(ALL:ALL) ALL"
        validate: '/usr/sbin/visudo -cf %s'

    - name: Move eth0 from Trusted to Public Zone (FirewallD)
      ansible.builtin.shell: |
        firewall-cmd --permanent --change-interface=eth0 --zone=public
        firewall-cmd --reload

    - name: Securely shred the traces
      ansible.builtin.shell: |
        # Shred the recovery file
        [ -f /home/fortress/FORTRESS_RECOVERY.txt ] && shred -u /home/fortress/FORTRESS_RECOVERY.txt
        
        # Shred Bash and Root history
        shred -u /home/fortress/.bash_history
        shred -u /root/.bash_history
        shred -u /boot/firmware/user-data
        shred -u /boot/firmware/network-config
        
        # Clear current session history
        history -c
      register: shred_result
      failed_when: false

    - name: Set the Fortress Mode Flag
      ansible.builtin.copy:
        dest: "/var/lib/fortress_mode"
        content: |
          LEAN
        owner: root
        group: root
        mode: '0644'

    - name: Disable SSH Password Authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH
          
  handlers:
    - name: Restart SSH
      include_tasks: "{{ playbook_dir }}/tasks/utils/restart_service.yaml"
      vars:
        target_service: ssh
