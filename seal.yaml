---
- name: Seal the Mobile Fortress
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Ensure Tailscale is active before locking eth0
      ansible.builtin.command: tailscale status --peers=false
      register: ts_status
      changed_when: false
      failed_when: ts_status.rc != 0
      # If this fails, the playbook stops here to prevent a lockout.

    - name: Generate unique high-entropy sudo password
      ansible.builtin.set_fact:
        new_sudo_pw: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits,symbols length=20') }}"

    - name: Apply new password to fortress user
      ansible.builtin.user:
        name: fortress
        password: "{{ new_sudo_pw | password_hash('yescrypt') }}"
        update_password: always

    - name: Remove NOPASSWD entry from cloud-init files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/sudoers.d/90-cloud-init-users
        - /etc/sudoers.d/010_pi-nopasswd

    - name: Enable Standard Sudo (Password Required)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/fortress-hardened
        mode: '0440'
        # Allows 'fortress' to use sudo but REQUIRES the new password
        content: "fortress ALL=(ALL) PASSWD: ALL"

    - name: Move eth0 from Trusted to Public (DROP) Zone
      ansible.builtin.shell: |
        firewall-cmd --permanent --zone=public --add-interface=eth0
        firewall-cmd --permanent --zone=trusted --remove-interface=eth0
      notify: Reload Firewalld

    - name: Securely shred the traces
      ansible.builtin.shell:
        cmd: |
          # Shred the recovery file
          [ -f /home/fortress/FORTRESS_RECOVERY.txt ] && shred -u /home/fortress/FORTRESS_RECOVERY.txt
          
          # Shred Bash and Root history
          shred -u /home/fortress/.bash_history
          shred -u /root/.bash_history
          
          # Clear current session history
          history -c
      register: shred_result
      failed_when: false # Don't crash if it was already deleted

    - name: "DISPLAY NEW SUDO PASSWORD: SAVE THIS NOW"
      ansible.builtin.debug:
        msg: 
          - "################################################"
          - "FORTRESS SEALED. NEW SUDO PASSWORD FOR 'fortress':"
          - "{{ new_sudo_pw }}"
          - "################################################"
          - "SUDO NOW REQUIRES THIS PASSWORD. SSH REMAINS KEY-ONLY."

    - name: Disable SSH Password Authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

  handlers:
    - name: Reload Firewalld
      ansible.builtin.shell: |
        firewall-cmd --runtime-to-permanent
        firewall-cmd --reload

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted
