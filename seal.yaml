---
- name: Seal the Mobile Fortress
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Ensure Tailscale is active before locking eth0
      ansible.builtin.command: tailscale status --peers=false
      register: ts_status
      changed_when: false
      failed_when: ts_status.rc != 0
      # If this fails, the playbook stops here to prevent a lockout.

    - name: Move eth0 from Trusted to Public (DROP) Zone
      ansible.builtin.shell: |
        firewall-cmd --permanent --zone=public --add-interface=eth0
        firewall-cmd --permanent --zone=trusted --remove-interface=eth0
      notify: Reload Firewalld

    - name: Securely shred the traces
      ansible.builtin.shell:
        cmd: |
          # Shred the recovery file
          [ -f /home/fortress/FORTRESS_RECOVERY.txt ] && shred -u /home/fortress/FORTRESS_RECOVERY.txt
          
          # Shred Bash and Root history
          shred -u /home/fortress_admin/.bash_history
          shred -u /root/.bash_history
          
          # Clear current session history
          history -c
      register: shred_result
      failed_when: false # Don't crash if it was already deleted

    - name: Disable SSH Password Authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

  handlers:
    - name: Reload Firewalld
      ansible.builtin.shell: |
        firewall-cmd --runtime-to-permanent
        firewall-cmd --reload

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted
