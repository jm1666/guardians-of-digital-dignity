- name: firewalld - Ensure FirewallD is started and enabled
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: yes

- name: firewalld - Set firewalld default zone to public
  ansible.builtin.shell: |
    firewall-cmd --set-default-zone=public
  register: zone_result
  # Only report a "change" if the zone wasn't already set to home
  changed_when: "'ZONE_ALREADY_SET' not in zone_result.stderr"
  failed_when: 
    - zone_result.rc != 0 
    - "'ZONE_ALREADY_SET' not in zone_result.stderr"

- name: firewalld - Move {{ ansible_default_ipv4.interface }}  from Public to Trusted Zone for facilitating setup
  ansible.builtin.shell: |
    firewall-cmd --permanent --change-interface={{ ansible_default_ipv4.interface }} --zone=trusted

- name: firewalld - Configure TTL/HL Mangling
  ansible.builtin.shell: |
      firewall-cmd --permanent --direct --add-rule ipv4 mangle POSTROUTING 0 -j TTL --ttl-set 129
      firewall-cmd --permanent --direct --add-rule ipv6 mangle POSTROUTING 0 -j HL --hl-set 129

- name: firewalld - Create Hotspot to Public Policy (Scout)
  ansible.builtin.shell: |
      firewall-cmd --permanent --new-policy hotspotToPublic
      firewall-cmd --permanent --policy hotspotToPublic --add-ingress-zone nm-shared
      firewall-cmd --permanent --policy hotspotToPublic --add-egress-zone public
      firewall-cmd --permanent --policy hotspotToPublic --set-priority -1
      firewall-cmd --permanent --policy hotspotToPublic --set-target ACCEPT
      firewall-cmd --permanent --policy hotspotToPublic --add-masquerade

- name: firewalld - Create Hotspot to VPN Policy (Tailscale)
  ansible.builtin.shell: |
      firewall-cmd --permanent --new-policy hotspotToVPN
      firewall-cmd --permanent --policy hotspotToVPN --add-ingress-zone nm-shared
      firewall-cmd --permanent --policy hotspotToVPN --add-egress-zone work
      firewall-cmd --permanent --policy hotspotToVPN --set-priority -10
      firewall-cmd --permanent --policy hotspotToVPN --set-target REJECT
      firewall-cmd --permanent --policy hotspotToVPN --add-masquerade

- name: firewalld - Close Public Zone Services
  ansible.posix.firewalld:
    zone: public
    service: "{{ item }}"
    permanent: true
    state: disabled
  loop: [ssh, dhcpv6-client, mdns]

- name: firewalld - Set Public Zone to DROP
  ansible.posix.firewalld:
    zone: public
    target: "DROP"
    permanent: true
    state: enabled

- name: firewalld - Open Ports for internal user
  ansible.posix.firewalld:
    zone: nm-shared
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - dns
    - dhcp
    - http
    - rdp
    - cockpit

- name: firewalld - Reload FirewallD
  ansible.builtin.command: |
    firewall-cmd --reload
