- name: initiation-el - Install EPEL repository on RHEL-based systems
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when:
    - ansible_os_family == 'RedHat'
    - ansible_distribution != 'Fedora'

- name: initiation-el - Install basic dependencies (Fedora)
  ansible.builtin.dnf:
    name:
      - curl
      - gnupg2
      - firewalld
      - wireless-regdb
      - iw
      - python3-passlib
    state: present
    update_cache: yes

- name: initiation-el - Unblock WiFi Radio
  ansible.builtin.shell: |
    rfkill unblock wifi
  changed_when: false

- name: initiation-el - Persist RFKILL State (SystemD Override)
  ansible.builtin.shell: |
    for f in /var/lib/systemd/rfkill/*:wlan; do
      if [ -f "$f" ]; then
        echo 0 > "$f"
      fi
    done
  register: rfkill_persist
  changed_when: "rfkill_persist.rc == 0"

- name: initiation-el - Ensure WiFi is enabled in NetworkManager
  ansible.builtin.shell: |
    nmcli radio wifi on
  changed_when: false

- name: initiation-el - Set the system hostname
  ansible.builtin.hostname:
    name: "{{ new_fortress_name }}"
  register: hostname_changed

- name: initiation-el - Update /etc/hosts for the new hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ new_fortress_name }}"
    state: present

- name: initiation-el - Update with new identity
  ansible.builtin.debug:
    msg: "Fortress has been renamed to {{ new_fortress_name }}. Reboot required for full effect."
  when: hostname_changed.changed
  notify: Reboot Required

- name: initiation-el - Disable Bluetooth (Fedora)
  ansible.builtin.blockinfile:
    path: /boot/efi/config.txt
    marker: "# {mark} ANSIBLE MANAGED Bluetooth"
    insertafter: EOF
    state: present
    block: |
      dtoverlay=disable-bt
  notify: Reboot Required

- name: initiation-el - Enable I2C and DS3231 RTC
  ansible.builtin.blockinfile:
    path: /boot/efi/config.txt
    marker: "# {mark} ANSIBLE MANAGED I2C DS3231"
    insertafter: EOF
    state: present
    block: |
      dtparam=i2c_arm=on
      dtoverlay=i2c-rtc,ds3231
  notify: Reboot Required
  when: not is_pi5

- name: initiation-el - Configure PWM Fan (Argon40 Mini Fan)
  ansible.builtin.blockinfile:
    path: /boot/efi/config.txt
    marker: "# {mark} ANSIBLE MANAGED Argon40 FAN"
    insertafter: EOF
    state: present
    block: |
      dtoverlay=pwm-gpio-fan,fan_gpio=18,fan_temp0=45000,fan_temp0_hyst=5000
  notify: Reboot Required
  when: not is_pi5

- name: initiation-el - Configure PWM Fan Curve (RasPi 5)
  ansible.builtin.blockinfile:
    path: /boot/efi/config.txt
    marker: "# {mark} ANSIBLE MANAGED PI5 FAN CURVE"
    insertafter: EOF
    state: present
    block: |
      dtparam=fan_temp0=45000,fan_temp0_speed=75,fan_temp0_hyst=5000
      dtparam=fan_temp1=55000,fan_temp1_speed=125,fan_temp1_hyst=5000
      dtparam=fan_temp2=65000,fan_temp2_speed=175,fan_temp2_hyst=5000
      dtparam=fan_temp3=75000,fan_temp3_speed=255,fan_temp3_hyst=5000
  notify: Reboot Required
  when: is_pi5
