- name: network-manager - Ensure NetworkManager is started and enabled
  ansible.builtin.service:
    name: NetworkManager
    state: started
    enabled: yes

- name: network-manager - Ensure config directory exists
  ansible.builtin.file:
    state: directory
    path: /etc/NetworkManager/conf.d
    owner: root
    group: root
    mode: "0755"
  
- name: network-manager - Deploy Config for Global Stealth Configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/files/99-fortress-stealth.conf"
    dest: /etc/NetworkManager/conf.d/99-fortress-stealth.conf
    owner: root
    group: root
    mode: '0644'
  register: nm_config_file

- name: network-manager - Deploy Config for Disabling Wi-Fi Power Saving
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/default-wifi-powersave-off.conf
    content: |
      [connection]
      wifi.powersave = 2
    owner: root
    group: root
    mode: '0644'
  register: nm_config_file

- name: network-manager - Deploy Config for wlan0
  ansible.builtin.template:
    src: "{{ playbook_dir }}/files/Fortress-AP.j2"
    dest: /etc/NetworkManager/system-connections/Fortress-AP.nmconnection
    owner: root
    group: root
    mode: '0600'
  register: nm_config_file

- name: network-manager - Deploy Config for {{ ansible_default_ipv4.interface }}
  ansible.builtin.template:
    src: "{{ playbook_dir }}/files/eth0.nmconnection.j2"
    dest: "/etc/NetworkManager/system-connections/{{ ansible_default_ipv4.interface }}.nmconnection"
    owner: root
    group: root
    mode: '0600'
  register: nm_config_file

- name: network-manager - Restart NetworkManager
  include_tasks: "{{ playbook_dir }}/tasks/utils/restart_service.yaml"
  vars:
    target_service: NetworkManager
  when: nm_config_file.changed

- name: network-manager - Force NetworkManager to learn new config
  ansible.builtin.shell: |
    cmd: |
      nmcli connection reload
      nmcli connection up {{ ansible_default_ipv4.interface }}
      nmcli connection up Fortress-AP
  when: nm_config_file.changed
